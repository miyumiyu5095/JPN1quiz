<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N1 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #242429;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text-primary: #f0ede8;
  --text-secondary: #8a8790;
  --text-muted: #555360;
  --accent: #c8b8f0;
  --accent-dim: rgba(200,184,240,0.12);
  --green: #7eddb0;
  --green-dim: rgba(126,221,176,0.12);
  --red: #f07e8a;
  --red-dim: rgba(240,126,138,0.12);
  --amber: #f0c87e;
  --amber-dim: rgba(240,200,126,0.12);
  --radius: 20px;
  --radius-sm: 12px;
}

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.screen { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 0 16px 80px; }
.screen.active { display: flex; }

/* ── TOPBAR ── */
.topbar { width: 100%; max-width: 480px; display: flex; align-items: center; justify-content: space-between; padding: 28px 0 20px; flex-shrink: 0; }
.topbar-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text-primary); }
.topbar-title-left { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text-primary); flex: 1; padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-back { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.topbar-back:hover { background: var(--surface2); }
.topbar-back svg { width: 18px; height: 18px; color: var(--text-secondary); }
.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-bar { width: 80px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-text { font-size: 13px; color: var(--text-secondary); font-weight: 500; min-width: 40px; text-align: right; }

/* ── HOME ── */
.section-label { width: 100%; max-width: 480px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin: 20px 0 10px; }

.home-banner {
  width: 100%; max-width: 480px;
  background: linear-gradient(135deg, rgba(200,184,240,0.08) 0%, rgba(200,184,240,0.03) 100%);
  border: 1px solid rgba(200,184,240,0.2);
  border-radius: var(--radius); padding: 24px 22px; margin-bottom: 4px;
}
.home-banner-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text-primary); margin-bottom: 6px; }
.home-banner-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.home-stats { display: flex; gap: 12px; margin-top: 18px; }
.home-stat { flex: 1; text-align: center; }
.home-stat-num { font-size: 24px; font-weight: 600; display: block; }
.home-stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 2px; }

/* ── DECK BUTTONS ── */
.deck-list { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; }
.deck-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.2s; }
.deck-card:hover { border-color: var(--border2); }
.deck-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; }
.deck-info { display: flex; flex-direction: column; gap: 4px; }
.deck-name { font-size: 15px; font-weight: 500; color: var(--text-primary); }
.deck-meta { font-size: 12px; color: var(--text-muted); }
.deck-btn { padding: 8px 18px; border-radius: 100px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.deck-btn-quiz { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,184,240,0.25); }
.deck-btn-quiz:hover { background: rgba(200,184,240,0.2); }
.deck-btn-star { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,200,126,0.25); }
.deck-btn-star:hover { background: rgba(240,200,126,0.2); }

/* ── WRONG SECTION ── */
.wrong-section { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.wrong-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; cursor: pointer; transition: background 0.15s; gap: 8px; }
.wrong-header:hover { background: var(--surface2); }
.wrong-header-left { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: var(--text-primary); flex: 1; }
.wrong-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.wrong-play-btn { padding: 6px 14px; border-radius: 100px; background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,126,138,0.25); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.wrong-play-btn:hover { background: rgba(240,126,138,0.2); }
.wrong-badge { background: var(--red-dim); color: var(--red); border-radius: 20px; font-size: 11px; font-weight: 600; padding: 2px 8px; }
.wrong-body { display: none; border-top: 1px solid var(--border); }
.wrong-body.open { display: block; }
.wrong-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--border); gap: 10px; }
.wrong-item:last-child { border-bottom: none; }
.wrong-item-left { display: flex; flex-direction: column; gap: 2px; }
.wrong-kanji { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.wrong-yomi { font-size: 11px; color: var(--accent); letter-spacing: 0.03em; }
.wrong-meaning { font-size: 12px; color: var(--text-secondary); flex: 1; text-align: right; }
.wrong-count { font-size: 11px; color: var(--red); background: var(--red-dim); border-radius: 10px; padding: 2px 8px; font-weight: 600; white-space: nowrap; }
.wrong-footer { padding: 14px 18px; }
.wrong-quiz-btn { width: 100%; padding: 12px; background: var(--red-dim); border: 1px solid rgba(240,126,138,0.25); border-radius: var(--radius-sm); color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.wrong-quiz-btn:hover { background: rgba(240,126,138,0.2); }
.wrong-empty { padding: 24px 18px; font-size: 13px; color: var(--text-muted); text-align: center; }

/* ── QUIZ SCREEN ── */
.quiz-stat-row { width: 100%; max-width: 480px; display: flex; gap: 8px; margin-bottom: 16px; }
.quiz-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; }
.quiz-stat-num { font-size: 22px; font-weight: 600; display: block; margin-bottom: 2px; }
.quiz-stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }

.quiz-card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 28px 28px; text-align: center; margin-bottom: 16px; position: relative; }
.quiz-kanji { font-size: 64px; font-weight: 700; color: var(--text-primary); line-height: 1; }

/* 별표 버튼 */
.star-btn {
  position: absolute; top: 14px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 18px; line-height: 1;
}
.star-btn:hover { border-color: var(--amber); background: var(--amber-dim); }
.star-btn.starred { background: var(--amber-dim); border-color: rgba(240,200,126,0.4); }

.del-btn {
  position: absolute; top: 14px; left: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 15px; line-height: 1; color: var(--text-muted);
}
.del-btn:hover { border-color: var(--red); background: var(--red-dim); color: var(--red); }

.quiz-choices { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.quiz-btn {
  width: 100%; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); font-family: 'DM Sans', sans-serif;
  font-size: 19px; font-weight: 500; cursor: pointer; transition: all 0.18s; text-align: left;
  display: flex; align-items: center; gap: 14px; letter-spacing: 0.06em;
}
.quiz-btn:hover:not(:disabled) { border-color: var(--border2); background: var(--surface2); }
.quiz-btn:disabled { cursor: not-allowed; }
.quiz-btn.correct { background: var(--green-dim); border-color: rgba(126,221,176,0.4); color: var(--green); }
.quiz-btn.wrong { background: var(--red-dim); border-color: rgba(240,126,138,0.4); color: var(--red); }
.quiz-btn-label { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; transition: all 0.18s; }
.quiz-btn.correct .quiz-btn-label { background: rgba(126,221,176,0.2); color: var(--green); }
.quiz-btn.wrong .quiz-btn-label { background: rgba(240,126,138,0.2); color: var(--red); }

.quiz-feedback { width: 100%; max-width: 480px; border-radius: var(--radius-sm); padding: 16px 18px; display: none; margin-bottom: 12px; border: 1px solid var(--border); background: var(--surface); }
.quiz-feedback.show { display: block; }
.quiz-feedback-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.quiz-feedback-title.ok { color: var(--green); }
.quiz-feedback-title.ng { color: var(--red); }
.quiz-feedback-body { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.quiz-feedback-body strong { color: var(--text-primary); font-size: 15px; }
.quiz-feedback-example { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

.quiz-nav-row { width: 100%; max-width: 480px; display: none; gap: 10px; }
.quiz-nav-row.show { display: flex; }
.quiz-prev-btn { flex: 0 0 52px; padding: 15px 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.quiz-prev-btn:hover { background: var(--surface2); border-color: var(--border2); }
.quiz-prev-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.quiz-next-btn { flex: 1; padding: 15px; background: var(--accent-dim); border: 1px solid rgba(200,184,240,0.25); border-radius: var(--radius-sm); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.quiz-next-btn:hover { background: rgba(200,184,240,0.2); }

/* ── COMPLETE ── */
.complete-wrap { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 480px; text-align: center; padding: 40px 20px; }
.complete-wrap.show { display: flex; }
.complete-emoji { font-size: 56px; }
.complete-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text-primary); }
.complete-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.complete-score { font-size: 48px; font-weight: 700; color: var(--accent); }
.complete-score-label { font-size: 13px; color: var(--text-muted); margin-top: -8px; }
.complete-btn { padding: 13px 28px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid; }
.complete-btn-primary { background: var(--accent-dim); color: var(--accent); border-color: rgba(200,184,240,0.25); }
.complete-btn-primary:hover { background: rgba(200,184,240,0.2); }
.complete-btn-wrong { background: var(--red-dim); color: var(--red); border-color: rgba(240,126,138,0.25); }
.complete-btn-wrong:hover { background: rgba(240,126,138,0.2); }
.complete-btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
.complete-btn-ghost:hover { background: var(--surface2); }

/* ── HARDCORE MODE ── */
.hc-display {
  width: 100%; max-width: 480px;
  min-height: 64px; padding: 16px 18px;
  background: var(--surface); border: 2px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 26px; letter-spacing: 0.08em;
  text-align: center; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s; user-select: none;
}
.hc-display.empty { color: var(--text-muted); font-size: 14px; letter-spacing: 0; }
.hc-display.active { border-color: var(--accent); }
.hc-keypad {
  width: 100%; max-width: 480px;
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
}
.hc-key {
  padding: 13px 4px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-primary); font-family: 'DM Sans', sans-serif;
  font-size: 18px; cursor: pointer; transition: all 0.12s;
  text-align: center; user-select: none;
}
.hc-key:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); }
.hc-key:active:not(:disabled) { transform: scale(0.92); }
.hc-key.special { font-size: 13px; color: var(--accent); border-color: rgba(200,184,240,0.25); background: var(--accent-dim); }
.hc-key.action { font-size: 13px; color: var(--text-secondary); background: var(--surface2); border-color: var(--border2); }
.hc-key.action:hover:not(:disabled) { color: var(--text-primary); }
.hc-key.submit-key {
  grid-column: span 5; padding: 14px;
  background: var(--red-dim); color: var(--red);
  border-color: rgba(240,126,138,0.3); font-size: 15px; font-weight: 600;
}
.hc-key.submit-key:hover:not(:disabled) { background: rgba(240,126,138,0.22); }
.hc-key:disabled { opacity: 0.25; cursor: not-allowed; }
.hc-hint { font-size: 11px; color: var(--text-muted); text-align: center; width: 100%; max-width: 480px; }

/* ── SETTINGS MODAL ── */
.settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: flex-end; justify-content: center; }
.settings-overlay.show { display: flex; }
.settings-box { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius) var(--radius) 0 0; padding: 28px 20px 40px; width: 100%; max-width: 480px; }
.settings-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text-primary); margin-bottom: 20px; }
.settings-section-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 10px; }
.settings-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; }
.settings-item-info { display: flex; flex-direction: column; gap: 3px; }
.settings-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.settings-item-desc { font-size: 12px; color: var(--text-muted); }
.settings-reset-btn { padding: 8px 16px; border-radius: 100px; background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,126,138,0.25); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.settings-reset-btn:hover { background: rgba(240,126,138,0.2); }
.settings-close-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; margin-top: 6px; }
.settings-close-btn:hover { background: var(--surface2); }
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div class="screen active" id="screenHome">
  <div style="height:8px"></div>
  <div class="topbar">
    <span class="topbar-title">JLPT N1 퀴즈</span>
    <button class="topbar-back" onclick="openSettings()" title="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="home-banner">
    <div class="home-banner-title">오늘도 한 문제씩 📝</div>
    <div class="home-banner-sub">한자를 보고 올바른 읽기(요미가나)를 골라보세요.</div>
    <div class="home-stats">
      <div class="home-stat">
        <span class="home-stat-num" id="statTotalWords" style="color:var(--accent);">0</span>
        <span class="home-stat-label">전체 단어</span>
      </div>
      <div class="home-stat">
        <span class="home-stat-num" id="statTotalCorrect" style="color:var(--green);">0</span>
        <span class="home-stat-label">총 정답</span>
      </div>
      <div class="home-stat">
        <span class="home-stat-num" id="statWrongCount" style="color:var(--red);">0</span>
        <span class="home-stat-label">오답 단어</span>
      </div>
    </div>
  </div>

  <!-- 단어장 -->
  <div class="section-label">단어장</div>
  <div class="deck-list" id="deckList"></div>

  <!-- 오답노트 -->
  <div class="section-label">오답노트</div>
  <div class="wrong-section">
    <div class="wrong-header" onclick="toggleWrong()">
      <div class="wrong-header-left">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        틀린 문제
        <span class="wrong-badge" id="wrongBadge">0</span>
      </div>
      <div class="wrong-header-right">
        <button class="wrong-play-btn" id="wrongPlayBtn" onclick="event.stopPropagation(); startWrongQuiz()">오답 풀기</button>
        <svg id="wrongChevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" style="transition:transform 0.25s"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="wrong-body" id="wrongBody"></div>
  </div>
</div>

<!-- ══════════ QUIZ ══════════ -->
<div class="screen" id="screenQuiz">
  <div class="topbar">
    <button class="topbar-back" onclick="exitQuiz()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="topbar-title-left" id="quizTitle">퀴즈</span>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="quizProgress"></div></div>
      <span class="progress-text" id="quizProgressText">1 / 500</span>
    </div>
  </div>

  <div class="quiz-stat-row">
    <div class="quiz-stat">
      <span class="quiz-stat-num" id="qCorrect" style="color:var(--green);">0</span>
      <span class="quiz-stat-label">정답</span>
    </div>
    <div class="quiz-stat">
      <span class="quiz-stat-num" id="qWrong" style="color:var(--red);">0</span>
      <span class="quiz-stat-label">오답</span>
    </div>
    <div class="quiz-stat">
      <span class="quiz-stat-num" id="qRemain" style="color:var(--text-secondary);">0</span>
      <span class="quiz-stat-label">남은 문제</span>
    </div>
  </div>

  <!-- 문제 카드 -->
  <div class="quiz-card" id="quizCard">

        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyAl7kPpEoxHE9v3ahfNzFtqwF54ANz1Ohk",
  authDomain: "my-flashcard-90a38.firebaseapp.com",
  projectId: "my-flashcard-90a38",
  storageBucket: "my-flashcard-90a38.firebasestorage.app",
  messagingSenderId: "911330115467",
  appId: "1:911330115467:web:73214ab95f457c0180f98e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const FB_REF = db.collection("n1quiz").doc("data");

// ── STATE ──
let words = [];
let wrongAnswers = {};  // { word: count }
let starredWords = {};  // { word: true }
let totalCorrect = 0;
let totalAttempts = 0;
let sessionCorrect = 0; // 전체퀴즈 누적 정답 (500개 완료까지 유지)
let sessionWrong = 0;   // 전체퀴즈 누적 오답

// 이어서 풀기용
let quizOrder = [];
let quizPos = 0;

// 현재 세션
let qCorrectCount = 0;
let qWrongCount = 0;
let answered = false;
let currentMode = 'all';
let quizHistory = []; // 이전 문제 히스토리 [{pos, card, wasCorrect}]
let historyIdx = -1;  // 히스토리 탐색 위치 (-1 = 현재 문제)

// 서브퀴즈(오답/별표)용
let subQuizList = [];
let subQuizIdx = 0;

// ── SOUND ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playCorrectSound() {
  const now = audioCtx.currentTime;
  [880, 1320].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + i * 0.1);
    gain.gain.setValueAtTime(0, now + i * 0.1);
    gain.gain.linearRampToValueAtTime(0.18, now + i * 0.1 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
    osc.start(now + i * 0.1);
    osc.stop(now + i * 0.1 + 0.3);
  });
}

function playWrongSound() {
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, now);
  osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
  gain.gain.setValueAtTime(0.18, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  osc.start(now);
  osc.stop(now + 0.4);
}

function stopMic() {} // 음성 모드 제거됨 — 호환성 유지용

// ── FIREBASE ──
async function save() {
  try {
    await FB_REF.set({
      words,
      wrongAnswers, starredWords,
      totalCorrect, totalAttempts,
      quizOrder, quizPos,
      sessionCorrect, sessionWrong
    });
  } catch(e) { console.error('save error', e); }
}

async function load(isRetry = false) {
  // 로딩 중 표시
  const list = document.getElementById('deckList');
  list.innerHTML = '<div style="font-size:14px;color:var(--text-muted);text-align:center;padding:28px 0;">⏳ 데이터 불러오는 중...</div>';

  try {
    const snap = await FB_REF.get();
    if (snap.exists) {
      const d = snap.data();
      if (d.words && d.words.length) words = d.words;
      if (d.wrongAnswers) wrongAnswers = d.wrongAnswers;
      if (d.starredWords) starredWords = d.starredWords;
      if (d.totalCorrect) totalCorrect = d.totalCorrect;
      if (d.totalAttempts) totalAttempts = d.totalAttempts;
      if (d.quizOrder && d.quizOrder.length) quizOrder = d.quizOrder;
      if (typeof d.quizPos === 'number') quizPos = d.quizPos;
      if (typeof d.sessionCorrect === 'number') sessionCorrect = d.sessionCorrect;
      if (typeof d.sessionWrong === 'number') sessionWrong = d.sessionWrong;
      if (isRetry) showToast('동기화 완료 ✓');
    }
  } catch(e) {
    console.error('load error', e);
  }

  // quizOrder가 없거나 단어 수와 맞지 않으면 새로 셔플
  if (!quizOrder.length || quizOrder.length !== words.length) {
    quizOrder = shuffle([...Array(words.length).keys()]);
    quizPos = 0;
  }

  // words가 없으면 → 재시도 버튼 표시 (데이터가 Firebase에 있을 수 있음)
  if (!words.length) {
    list.innerHTML = `
      <div style="text-align:center;padding:28px 16px;">
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:16px;line-height:1.7;">
          단어 데이터를 불러오지 못했어요.<br>
          <span style="font-size:12px;">네트워크 문제일 수 있으니 다시 시도해보세요.</span>
        </div>
        <button onclick="load(true)" style="padding:10px 24px;border-radius:100px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,184,240,0.25);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">
          🔄 다시 불러오기
        </button>
        <div style="margin-top:12px;font-size:11px;color:var(--text-muted);">
          계속 안 되면 설정 → 단어 데이터 업로드를 해주세요.
        </div>
      </div>`;
    return; // renderHome 호출 안 함 (이미 메시지 표시)
  }

  renderHome();
}

// ── SCREEN ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── HOME ──
function renderHome() {
  document.getElementById('statTotalWords').textContent = words.length;
  document.getElementById('statTotalCorrect').textContent = totalCorrect;
  document.getElementById('statWrongCount').textContent = Object.keys(wrongAnswers).length;

  const list = document.getElementById('deckList');
  list.innerHTML = '';

  const starCount = Object.keys(starredWords).length;
  const wrongCount = Object.keys(wrongAnswers).length;
  const remaining = words.length - quizPos;

  if (!words.length) {
    list.innerHTML = '';
    return;
  } else {
    // 전체 퀴즈 (이어서)
    const allEl = document.createElement('div');
    allEl.className = 'deck-card';
    allEl.style.borderColor = 'rgba(200,184,240,0.25)';
    const resumeLabel = quizPos > 0 && quizPos < words.length
      ? `이어서 풀기 (${quizPos}/${words.length} 완료)`
      : quizPos >= words.length ? '완료 — 처음부터 다시' : `전체 ${words.length}개`;
    allEl.innerHTML = `
      <div class="deck-header">
        <div class="deck-info">
          <span class="deck-name" style="color:var(--accent);">전체 단어 퀴즈</span>
          <span class="deck-meta">${resumeLabel}</span>
        </div>
        <button class="deck-btn deck-btn-quiz" onclick="startAllQuiz()">
          ${quizPos > 0 && quizPos < words.length ? '이어서 ▶' : '시작'}
        </button>
      </div>`;
    list.appendChild(allEl);

    // 별표 퀴즈
    const starEl = document.createElement('div');
    starEl.className = 'deck-card';
    starEl.style.borderColor = starCount > 0 ? 'rgba(240,200,126,0.25)' : '';
    starEl.innerHTML = `
      <div class="deck-header">
        <div class="deck-info">
          <span class="deck-name" style="color:var(--amber);">★ 체크한 문제 풀기</span>
          <span class="deck-meta">${starCount}개 체크됨</span>
        </div>
        <button class="deck-btn deck-btn-star" onclick="startStarQuiz()" ${starCount < 2 ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>퀴즈</button>
      </div>`;
    list.appendChild(starEl);

    // 하드코어 모드
    const hardEl = document.createElement('div');
    hardEl.className = 'deck-card';
    hardEl.style.borderColor = 'rgba(240,126,138,0.25)';
    hardEl.innerHTML = `
      <div class="deck-header">
        <div class="deck-info">
          <span class="deck-name" style="color:var(--red);">🎤 하드코어 모드</span>
          <span class="deck-meta">직접 입력해서 답변</span>
        </div>
        <button class="deck-btn" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(240,126,138,0.25);" onclick="startHardcoreQuiz()">시작</button>
      </div>`;
    list.appendChild(hardEl);
  }

  renderWrongSection();
}

// ── WRONG SECTION ──
function renderWrongSection() {
  const entries = Object.entries(wrongAnswers).sort((a,b) => b[1]-a[1]);
  document.getElementById('wrongBadge').textContent = entries.length;
  const playBtn = document.getElementById('wrongPlayBtn');
  if (entries.length < 2) {
    playBtn.disabled = true;
    playBtn.style.opacity = '0.35';
    playBtn.style.cursor = 'not-allowed';
  } else {
    playBtn.disabled = false;
    playBtn.style.opacity = '1';
    playBtn.style.cursor = 'pointer';
  }
  const body = document.getElementById('wrongBody');
  body.innerHTML = '';
  if (!entries.length) {
    body.innerHTML = '<div class="wrong-empty">아직 오답이 없어요 🎉</div>';
    return;
  }
  entries.forEach(([word, count]) => {
    const w = words.find(w => w.word === word);
    if (!w) return;
    const item = document.createElement('div');
    item.className = 'wrong-item';
    item.innerHTML = `
      <div class="wrong-item-left">
        <span class="wrong-kanji">${w.word}</span>
        <span class="wrong-yomi">${w.yomi}</span>
      </div>
      <span class="wrong-meaning">${w.meaning}</span>
      <span class="wrong-count">${count}회</span>`;
    body.appendChild(item);
  });
  const footer = document.createElement('div');
  footer.className = 'wrong-footer';
  footer.innerHTML = `<button class="wrong-quiz-btn" onclick="startWrongQuiz()">오답 단어만 다시 풀기 (${entries.length}개)</button>`;
  body.appendChild(footer);
}

function toggleWrong() {
  const body = document.getElementById('wrongBody');
  const chevron = document.getElementById('wrongChevron');
  const open = body.classList.toggle('open');
  chevron.style.transform = open ? 'rotate(180deg)' : '';
}

// ── QUIZ START ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startAllQuiz() {
  if (quizPos >= words.length) {
    // 전부 다 풀었으면 처음부터
    quizOrder = shuffle([...Array(words.length).keys()]);
    quizPos = 0;
    sessionCorrect = 0;
    sessionWrong = 0;
  }
  currentMode = 'all';
  // 이어서: 카운터는 sessionCorrect/sessionWrong 유지
  qCorrectCount = sessionCorrect;
  qWrongCount = sessionWrong;
  answered = false;
  document.getElementById('quizTitle').textContent = '전체 퀴즈';
  resetQuizUI();
  showScreen('screenQuiz');
  renderQuestion();
}

function startWrongQuiz() {
  const pool = words.filter(w => wrongAnswers[w.word]);
  if (pool.length < 2) { showToast('오답이 2개 이상 있어야 합니다'); return; }
  currentMode = 'wrong';
  subQuizList = shuffle(pool);
  subQuizIdx = 0;
  qCorrectCount = 0; qWrongCount = 0; answered = false;
  document.getElementById('quizTitle').textContent = '오답 퀴즈';
  resetQuizUI();
  showScreen('screenQuiz');
  renderQuestion();
}

function startStarQuiz() {
  const pool = words.filter(w => starredWords[w.word]);
  if (pool.length < 2) { showToast('별표 단어가 2개 이상 있어야 합니다'); return; }
  currentMode = 'star';
  subQuizList = shuffle(pool);
  subQuizIdx = 0;
  qCorrectCount = 0; qWrongCount = 0; answered = false;
  document.getElementById('quizTitle').textContent = '★ 별표 퀴즈';
  resetQuizUI();
  showScreen('screenQuiz');
  renderQuestion();
}

// ── HARDCORE MODE ──
function startHardcoreQuiz() {
  if (quizPos >= words.length) {
    quizOrder = shuffle([...Array(words.length).keys()]);
    quizPos = 0;
    sessionCorrect = 0;
    sessionWrong = 0;
  }
  currentMode = 'hardcore';
  qCorrectCount = sessionCorrect;
  qWrongCount = sessionWrong;
  answered = false;
  document.getElementById('quizTitle').textContent = '⌨️ 하드코어 모드';
  resetQuizUI();
  showScreen('screenQuiz');
  renderQuestion();
}

function normalizeYomi(str) {
  return str.trim().replace(/\s/g,'')
    .replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60))
    .replace(/う/g,'').replace(/ー/g,'')
    .replace(/い(?=[^あいうえおぁぃぅぇぉ]|$)/g,'')
    .replace(/っ/g,'').replace(/[、。・]/g,'');
}

function submitHcAnswer() {
  if (answered) return;
  const inp = document.getElementById('hcInput');
  const spoken = inp ? inp.value.trim() : '';
  if (!spoken) return;
  // 입력창 즉시 숨기기
  const hw = document.getElementById('hcWrap');
  if (hw) hw.style.display = 'none';
  const card = getCurrentCard();
  // 100% 정확 일치 (히라가나 정규화 후)
  const correct = toHiragana(spoken) === card.yomi;
  selectAnswerHardcore(correct, spoken, card);
}

// 카타카나→히라가나, 전각→반각 정규화
function toHiragana(str) {
  return str.trim()
    .replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))
    .replace(/\s/g, '');
}

function selectAnswerHardcore(correct, spoken, card) {
  if (answered) return;
  answered = true;
  const title = document.getElementById('qfTitle');
  const bodyEl = document.getElementById('qfBody');
  const ex = document.getElementById('qfExample');
  if (correct) {
    qCorrectCount++; totalCorrect++;
    title.className = 'quiz-feedback-title ok';
    title.textContent = '⭕ 정답!';
    if (wrongAnswers[card.word] > 0) {
      wrongAnswers[card.word]--;
      if (wrongAnswers[card.word] === 0) delete wrongAnswers[card.word];
    }
    playCorrectSound();
  } else {
    qWrongCount++;
    title.className = 'quiz-feedback-title ng';
    title.textContent = '❌ 오답! — 입력: "' + spoken + '"';
    wrongAnswers[card.word] = (wrongAnswers[card.word] || 0) + 1;
    playWrongSound();
  }
  totalAttempts++;
  bodyEl.innerHTML = '<strong>' + card.word + '【' + card.yomi + '】</strong> — ' + card.meaning +
    (card.meaningEn ? ' <span style="color:var(--text-muted);font-size:12px;">/ ' + card.meaningEn + '</span>' : '');
  ex.innerHTML = card.example
    ? card.example + '<br><span style="color:var(--text-muted);">' + (card.exampleKo||'') + '</span>' : '';
  document.getElementById('quizFeedback').classList.add('show');
  document.getElementById('qCorrect').textContent = qCorrectCount;
  document.getElementById('qWrong').textContent = qWrongCount;
  setJishoLink(card.word);
  updateStarBtn(card.word);
  quizPos++;
  sessionCorrect = qCorrectCount;
  sessionWrong = qWrongCount;
  quizHistory.unshift({ card, choicesSnapshot:[], correctYomi:card.yomi, userYomi:spoken });
  if (quizHistory.length > 50) quizHistory.pop();
  // hcNextBtn만 표시 (quizNavRow는 숨김)
  const hcNext = document.getElementById('hcNextBtn');
  if (hcNext) hcNext.style.display = 'block';
  save();
}

function resetQuizUI() {
  document.getElementById('quizComplete').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('quizChoices').style.display = 'flex';
  const hw = document.getElementById('hcWrap'); if (hw) hw.style.display = 'none';
  const hn = document.getElementById('hcNextBtn'); if (hn) hn.style.display = 'none';
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('qfJisho').style.display = 'none';
  document.getElementById('quizNavRow').classList.remove('show');
  quizHistory = [];
  historyIdx = -1;
}

// ── RENDER QUESTION ──
function getCurrentCard() {
  if (currentMode === 'all' || currentMode === 'hardcore') return words[quizOrder[quizPos]];
  return subQuizList[subQuizIdx];
}

function isFinished() {
  if (currentMode === 'all' || currentMode === 'hardcore') return quizPos >= words.length;
  return subQuizIdx >= subQuizList.length;
}

function getTotalForMode() {
  if (currentMode === 'all' || currentMode === 'hardcore') return words.length;
  return subQuizList.length;
}

function getIdxForMode() {
  if (currentMode === 'all' || currentMode === 'hardcore') return quizPos;
  return subQuizIdx;
}

function renderQuestion() {
  if (isFinished()) { showComplete(); return; }
  historyIdx = -1; // 현재 문제로 복귀
  answered = false;

  const card = getCurrentCard();
  const total = getTotalForMode();
  const idx = getIdxForMode();
  const pct = (idx / total) * 100;

  document.getElementById('quizProgress').style.width = pct + '%';
  document.getElementById('quizProgressText').textContent = `${idx+1} / ${total}`;
  document.getElementById('qCorrect').textContent = qCorrectCount;
  document.getElementById('qWrong').textContent = qWrongCount;
  document.getElementById('qRemain').textContent = total - idx;
  document.getElementById('quizKanji').textContent = card.word;
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('quizNavRow').classList.remove('show');
  document.getElementById('qfJisho').style.display = 'none';

  const _hn = document.getElementById('hcNextBtn'); if (_hn) _hn.style.display = 'none';
  // 별표 버튼 — 매 문제마다 완전히 초기화 (onclick도 재바인딩)
  const starBtn = document.getElementById('starBtn');
  starBtn.onclick = () => toggleStar();
  updateStarBtn(card.word);

  // 하드코어 모드: 4지선다 숨기고 입력창 표시
  if (currentMode === 'hardcore') {
    document.getElementById('quizChoices').style.display = 'none';
    document.getElementById('hcWrap').style.display = 'flex';
    const inp = document.getElementById('hcInput');
    if (inp) { inp.value = ''; inp.disabled = false; inp.focus(); }
    document.getElementById('hcSubmitBtn').disabled = true;
    return;
  }

  // 일반 모드: 입력창 숨기고 4지선다 표시
  document.getElementById('hcWrap').style.display = 'none';
  document.getElementById('quizChoices').style.display = 'flex';

  // 보기
  const distractors = makeDistractors(card.yomi, words.filter(w => w.word !== card.word), 3, card.word);
  const choices = shuffle([card.yomi, ...distractors]);
  const labels = ['A','B','C','D'];
  const choicesEl = document.getElementById('quizChoices');
  choicesEl.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn';
    btn.dataset.yomi = c;
    btn.innerHTML = `<span class="quiz-btn-label">${labels[i]}</span>${c}`;
    btn.onclick = () => selectAnswer(c, card, btn, [...choicesEl.querySelectorAll('.quiz-btn')]);
    choicesEl.appendChild(btn);
  });
}

// Jisho 링크 업데이트
function setJishoLink(word) {
  const wrap = document.getElementById('qfJisho');
  const link = document.getElementById('qfJishoLink');
  link.href = `https://jisho.org/search/${encodeURIComponent(word)}`;
  wrap.style.display = 'block';
}

// 별표 버튼 상태 업데이트 (항상 starredWords 기준)
function updateStarBtn(word) {
  const starBtn = document.getElementById('starBtn');
  const isStarred = !!starredWords[word];
  starBtn.textContent = isStarred ? '★' : '☆';
  starBtn.className = 'star-btn' + (isStarred ? ' starred' : '');
}

// ── 이전 문제 보기 ──
function renderHistoryQuestion(hEntry) {
  const { card, choicesSnapshot, correctYomi, userYomi } = hEntry;

  document.getElementById('quizKanji').textContent = card.word;
  document.getElementById('quizFeedback').classList.remove('show');

  const starBtn2 = document.getElementById('starBtn');
  starBtn2.onclick = () => toggleStar();
  updateStarBtn(card.word);

  const labels = ['A','B','C','D'];
  const choicesEl = document.getElementById('quizChoices');
  choicesEl.innerHTML = '';
  choicesSnapshot.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-btn';
    btn.dataset.yomi = c;
    btn.disabled = true;
    if (c === correctYomi) btn.classList.add('correct');
    else if (c === userYomi && c !== correctYomi) btn.classList.add('wrong');
    btn.innerHTML = `<span class="quiz-btn-label">${labels[i]}</span>${c}`;
    choicesEl.appendChild(btn);
  });

  // 피드백 표시
  const fb = document.getElementById('quizFeedback');
  const title = document.getElementById('qfTitle');
  const bodyEl = document.getElementById('qfBody');
  const ex = document.getElementById('qfExample');
  const wasCorrect = userYomi === correctYomi;
  title.className = 'quiz-feedback-title ' + (wasCorrect ? 'ok' : 'ng');
  title.textContent = wasCorrect ? '⭕ 정답!' : '❌ 오답!';
  bodyEl.innerHTML = `<strong>${card.word}【${card.yomi}】</strong> — ${card.meaning}${card.meaningEn ? ` <span style="color:var(--text-muted);font-size:12px;">/ ${card.meaningEn}</span>` : ""}`;
  ex.innerHTML = card.example ? `${card.example}<br><span style="color:var(--text-muted);">${card.exampleKo || ''}</span>` : '';
  fb.classList.add('show');
  setJishoLink(card.word);

  // 이전 버튼/다음 버튼 표시
  document.getElementById('quizNavRow').classList.add('show');
  document.getElementById('quizPrevBtn').disabled = (historyIdx >= quizHistory.length - 1);
  document.getElementById('quizNextBtn').textContent = historyIdx === 0 ? '다음 →' : '앞으로 →';
}

function prevQuestion() {
  if (!quizHistory.length) return;
  if (historyIdx === -1) {
    // 현재 문제에서 → 직전 히스토리로
    if (quizHistory.length === 0) return;
    historyIdx = 0;
  } else {
    if (historyIdx >= quizHistory.length - 1) return;
    historyIdx++;
  }
  renderHistoryQuestion(quizHistory[historyIdx]);
}

function nextQuestion() {
  if (historyIdx > 0) {
    historyIdx--;
    renderHistoryQuestion(quizHistory[historyIdx]);
    return;
  }
  // historyIdx === 0 또는 -1: 항상 새 문제로 진행
  historyIdx = -1;
  renderQuestion();
}

// ── STAR ──
function toggleStar() {
  const card = historyIdx === -1 ? getCurrentCard() : quizHistory[historyIdx]?.card;
  if (!card) return;
  if (starredWords[card.word]) {
    delete starredWords[card.word];
    showToast('별표 해제');
  } else {
    starredWords[card.word] = true;
    showToast('★ 별표 추가');
  }
  updateStarBtn(card.word);
  save();
}

// ── DELETE ──
function deleteCurrentWord() {
  const card = getCurrentCard();
  if (!card) return;
  if (!confirm(`"${card.word}" 을(를) 단어장에서 삭제할까요?`)) return;

  // words 배열에서 제거
  const wordIdx = words.findIndex(w => w.word === card.word);
  if (wordIdx !== -1) words.splice(wordIdx, 1);

  // 관련 데이터 정리
  delete wrongAnswers[card.word];
  delete starredWords[card.word];

  // quizOrder 재구성 (삭제된 인덱스 제거 + 인덱스 조정)
  quizOrder = quizOrder
    .filter(i => i !== wordIdx)
    .map(i => i > wordIdx ? i - 1 : i);
  // quizPos가 현재 가리키는 위치는 이미 삭제됐으므로 조정
  if (quizPos > quizOrder.length) quizPos = quizOrder.length;

  // subQuizList에서도 제거
  if (currentMode !== 'all') {
    subQuizList = subQuizList.filter(w => w.word !== card.word);
    if (subQuizIdx >= subQuizList.length) subQuizIdx = Math.max(0, subQuizList.length - 1);
  }

  showToast(`"${card.word}" 삭제됨`);

  // Firebase 전체 저장 (words 배열 변경됐으므로)
  FB_REF.set({ words, wrongAnswers, starredWords, totalCorrect, totalAttempts, quizOrder, quizPos })
    .catch(e => console.error(e));

  // 다음 문제로
  renderQuestion();
}

// ── ANSWER ──
function selectAnswer(chosen, card, clickedBtn, allBtns) {
  if (answered) return;
  answered = true;
  const correct = chosen === card.yomi;

  // 보기 스냅샷 저장 (이전 보기 복원용)
  const choicesSnapshot = allBtns.map(b => b.dataset.yomi);

  allBtns.forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.yomi === card.yomi) btn.classList.add('correct');
    else if (btn === clickedBtn && !correct) btn.classList.add('wrong');
  });

  const title = document.getElementById('qfTitle');
  const bodyEl = document.getElementById('qfBody');
  const ex = document.getElementById('qfExample');

  if (correct) {
    qCorrectCount++;
    totalCorrect++;
    title.className = 'quiz-feedback-title ok';
    title.textContent = '⭕ 정답!';
    if (wrongAnswers[card.word] > 0) {
      wrongAnswers[card.word]--;
      if (wrongAnswers[card.word] === 0) delete wrongAnswers[card.word];
    }
    if (currentMode === 'all') sessionCorrect++;
    // 별표 퀴즈에서 정답 맞추면 자동으로 별표 해제
    if (currentMode === 'star' && starredWords[card.word]) {
      delete starredWords[card.word];
      updateStarBtn(card.word);
    }
    playCorrectSound();
  } else {
    qWrongCount++;
    title.className = 'quiz-feedback-title ng';
    title.textContent = '❌ 오답!';
    wrongAnswers[card.word] = (wrongAnswers[card.word] || 0) + 1;
    if (currentMode === 'all') sessionWrong++;
  }

  totalAttempts++;
  bodyEl.innerHTML = `<strong>${card.word}【${card.yomi}】</strong> — ${card.meaning}${card.meaningEn ? ` <span style="color:var(--text-muted);font-size:12px;">/ ${card.meaningEn}</span>` : ""}`;
  ex.innerHTML = card.example
    ? `${card.example}<br><span style="color:var(--text-muted);">${card.exampleKo || ''}</span>`
    : '';

  document.getElementById('quizFeedback').classList.add('show');
  document.getElementById('qCorrect').textContent = qCorrectCount;
  document.getElementById('qWrong').textContent = qWrongCount;
  setJishoLink(card.word);

  // 진행 위치 저장
  if (currentMode === 'all') quizPos++;
  else subQuizIdx++;

  // 히스토리에 저장 (앞에 추가)
  quizHistory.unshift({ card, choicesSnapshot, correctYomi: card.yomi, userYomi: chosen });
  if (quizHistory.length > 50) quizHistory.pop(); // 최대 50개 보관

  // nav 버튼 표시
  document.getElementById('quizNavRow').classList.add('show');
  document.getElementById('quizPrevBtn').disabled = false;
  document.getElementById('quizNextBtn').textContent = '다음 →';

  // 별표 버튼 — 답 고른 직후 현재 카드 기준으로 즉시 갱신
  updateStarBtn(card.word);

  save();
}

// ── COMPLETE ──
function showComplete() {
  stopMic();
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('quizChoices').style.display = 'none';
  document.getElementById('hcWrap').style.display = 'none';
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('quizNavRow').classList.remove('show');

  const total = getTotalForMode();
  const pct = Math.round(qCorrectCount / Math.max(total,1) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';

  document.getElementById('completeScore').textContent = pct + '%';
  document.getElementById('completeScoreLabel').textContent = `${total}문제 중 ${qCorrectCount}개 정답`;
  document.getElementById('completeSub').textContent =

    pct >= 90 ? '완벽합니다! N1 합격이 보입니다!' :
    pct >= 70 ? '잘 하고 있어요! 조금만 더!' :
    pct >= 50 ? '계속 연습하면 실력이 늘어요!' : '오답 퀴즈로 복습해보세요!';

function restartQuiz() {
  if (currentMode === 'all') {
    quizOrder = shuffle([...Array(words.length).keys()]);
    quizPos = 0;
    save();
    startAllQuiz();
  } else if (currentMode === 'wrong') {
    startWrongQuiz();
  } else if (currentMode === 'hardcore') {
    quizOrder = shuffle([...Array(words.length).keys()]);
    quizPos = 0; sessionCorrect = 0; sessionWrong = 0;
    save();
    startHardcoreQuiz();
  } else {
    startStarQuiz();
  }
}

function exitQuiz() {
  stopMic();
  renderHome();
  showScreen('screenHome');
}

// ── DISTRACTOR LOGIC ──
function isHiragana(ch) { return ch >= 'ぁ' && ch <= 'ん'; }
function isKanji(ch) { return ch >= '\u4e00' && ch <= '\u9fff'; }
function isPureKanji(word) { return [...word].every(c => isKanji(c)); }

function extractFixedMask(word, yomi) {
  const wChars = [...word];
  const yChars = [...yomi];
  const hasKanji = wChars.some(isKanji);
  if (!hasKanji) return new Array(yChars.length).fill(false);
  const fixedMask = new Array(yChars.length).fill(false);
  const segs = [];
  let cur = '', curType = null;
  for (const ch of wChars) {
    const t = (isHiragana(ch) || ch === 'っ' || ch === 'ー') ? 'h' : 'k';
    if (t !== curType) { if (cur) segs.push([curType, cur]); cur = ch; curType = t; }
    else cur += ch;
  }
  if (cur) segs.push([curType, cur]);
  const totalHira = wChars.filter(c => isHiragana(c) || c === 'っ' || c === 'ー').length;
  const kanjiYomiLen = yChars.length - totalHira;
  const kanjiSegCount = Math.max(1, segs.filter(s => s[0] === 'k').length);
  const perKanji = Math.max(1, Math.round(kanjiYomiLen / kanjiSegCount));
  let yPos = 0;
  for (const [type, str] of segs) {
    if (type === 'h') {
      for (let i = 0; i < str.length && yPos + i < yChars.length; i++) fixedMask[yPos + i] = true;
      yPos += str.length;
    } else { yPos += perKanji; }
  }
  return fixedMask;
}

const DAKUTEN = {
  'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご',
  'さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
  'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど',
  'は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ',
  'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ',
  'ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
  'だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と',
  'ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ',
  'ぱ':'ば','ぴ':'び','ぷ':'ぶ','ぺ':'べ','ぽ':'ぼ',
  'ば':'ぱ','び':'ぴ','ぶ':'ぷ','べ':'ぺ','ぼ':'ぽ',
};

function generateVariants(yomi, fixedMask) {
  const chars = [...yomi];
  const variants = [];
  const flex = chars.map((_, i) => !fixedMask[i] ? i : null).filter(i => i !== null);

  // 1. 각 가변 위치 탁음 토글
  for (const i of flex) {
    if (DAKUTEN[chars[i]]) {
      const v = [...chars]; v[i] = DAKUTEN[chars[i]]; variants.push(v.join(''));
    }
  }
  // 2. 장음 삽입
  for (const i of flex) {
    const v = [...chars]; v.splice(i + 1, 0, 'う'); variants.push(v.join(''));
    const v2 = [...chars]; v2.splice(i + 1, 0, 'い'); variants.push(v2.join(''));
  }
  // 3. 탁음 + 장음 조합
  for (const i of flex) {
    if (DAKUTEN[chars[i]]) {
      const v = [...chars]; v[i] = DAKUTEN[chars[i]]; v.splice(i + 1, 0, 'う');
      variants.push(v.join(''));
    }
  }
  // 4. 장음 제거
  for (const i of flex) {
    if ((chars[i] === 'う' || chars[i] === 'い') && chars.length > 2) {
      const v = [...chars]; v.splice(i, 1); variants.push(v.join(''));
    }
  }
  // 5. 인접 가변 글자 순서 교환
  for (let a = 0; a < flex.length - 1; a++) {
    if (flex[a + 1] === flex[a] + 1) {
      const v = [...chars]; [v[flex[a]], v[flex[a+1]]] = [v[flex[a+1]], v[flex[a]]];
      variants.push(v.join(''));
    }
  }
  // 6. 두 위치 동시 탁음
  for (let a = 0; a < flex.length - 1; a++) {
    for (let b = a + 1; b < flex.length; b++) {
      if (DAKUTEN[chars[flex[a]]] && DAKUTEN[chars[flex[b]]]) {
        const v = [...chars];
        v[flex[a]] = DAKUTEN[chars[flex[a]]];
        v[flex[b]] = DAKUTEN[chars[flex[b]]];
        variants.push(v.join(''));
      }
    }
  }
  // 7. 촉음 삽입
  for (const i of flex) {
    if (i > 0) { const v = [...chars]; v.splice(i, 0, 'っ'); variants.push(v.join('')); }
  }

  return [...new Set(variants)].filter(v => v.length > 1 && v !== yomi && isValidYomi(v));
}

function isValidYomi(yomi) {
  if (!yomi || yomi.length === 0) return false;
  // ん으로 시작하는 단어 제외
  if (yomi[0] === 'ん') return false;
  // っ가 연속으로 나오는 경우 제외 (っっ)
  if (/っっ/.test(yomi)) return false;
  // っ로 끝나는 경우 제외
  if (yomi.endsWith('っ')) return false;
  // っ 바로 뒤에 올 수 없는 문자 체크 (ん, 모음 단독 등)
  if (/っん/.test(yomi)) return false;
  if (/っ[あいうえおぁぃぅぇぉ]/.test(yomi)) return false;
  return true;
}

function makeDistractors(correctYomi, otherWords, count, cardWord) {
  const distractors = new Set();
  const fixedMask = cardWord
    ? extractFixedMask(cardWord, correctYomi)
    : new Array([...correctYomi].length).fill(false);
  const pureKanji = cardWord ? isPureKanji(cardWord) : false;

  // 1순위: 변형 보기 (셔플해서 다양하게)
  for (const v of shuffle(generateVariants(correctYomi, fixedMask))) {
    if (distractors.size >= count) break;
    distractors.add(v);
  }

  // 순수 한자가 아닌 경우(혼용 단어): 같은 길이+첫글자 실제 단어도 사용
  if (!pureKanji && distractors.size < count) {
    const correctLen = [...correctYomi].length;
    const sameLen = otherWords
      .filter(w => w.yomi !== correctYomi && [...w.yomi].length === correctLen && w.yomi[0] === correctYomi[0] && isValidYomi(w.yomi))
      .map(w => w.yomi);
    for (const y of shuffle(sameLen)) {
      if (distractors.size >= count) break;
      if (!distractors.has(y)) distractors.add(y);
    }
  }

  // 유사도 높은 실제 단어로 보충
  if (distractors.size < count) {
    const scored = otherWords
      .filter(w => w.yomi !== correctYomi && !distractors.has(w.yomi) && isValidYomi(w.yomi))
      .map(w => {
        const wc = [...w.yomi], cc = [...correctYomi];
        const lenScore = 1 / (1 + Math.abs(wc.length - cc.length));
        const firstScore = wc[0] === cc[0] ? 2 : 0;
        const aSet = new Set(cc);
        const common = wc.filter(c => aSet.has(c)).length / Math.max(wc.length, cc.length);
        return { yomi: w.yomi, score: lenScore + firstScore + common };
      })
      .sort((a, b) => b.score - a.score).slice(0, 15).map(w => w.yomi);
    for (const y of shuffle(scored)) {
      if (distractors.size >= count) break;
      distractors.add(y);
    }
  }

  // 최후: 랜덤
  if (distractors.size < count) {
    const rest = shuffle(otherWords.map(w => w.yomi).filter(y => y !== correctYomi && !distractors.has(y) && isValidYomi(y)));
    for (const y of rest) {
      if (distractors.size >= count) break;
      distractors.add(y);
    }
  }

  return [...distractors].slice(0, count);
}

function uploadJsonFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.words || !data.words.length) {
        showToast('올바른 JSON 파일이 아닙니다'); return;
      }
      showToast('업로드 중...');
      await FB_REF.set(data);
      // 메모리에도 반영
      words = data.words;
      wrongAnswers = data.wrongAnswers || {};
      starredWords = data.starredWords || {};
      totalCorrect = data.totalCorrect || 0;
      totalAttempts = data.totalAttempts || 0;
      sessionCorrect = data.sessionCorrect || 0;
      sessionWrong = data.sessionWrong || 0;
      quizOrder = shuffle([...Array(words.length).keys()]);
      quizPos = 0;
      await FB_REF.set({ words, wrongAnswers, starredWords, totalCorrect, totalAttempts, quizOrder, quizPos, sessionCorrect, sessionWrong });
      closeSettings();
      renderHome();
      showToast(`✓ ${words.length}개 단어 업로드 완료!`);
    } catch(err) {
      showToast('업로드 실패: ' + err.message);
    }
    input.value = ''; // 같은 파일 재선택 가능하게
  };
  reader.readAsText(file);
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(e) {
  if (e && e.target !== document.getElementById('settingsOverlay')) return;
  document.getElementById('settingsOverlay').classList.remove('show');
}

function resetAllData() {
  if (!confirm('모든 공부 기록, 체크, 진행도, 틀린문제를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')) return;
  wrongAnswers = {};
  starredWords = {};
  totalCorrect = 0;
  totalAttempts = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  quizOrder = shuffle([...Array(words.length).keys()]);
  quizPos = 0;
  FB_REF.set({ words, wrongAnswers, starredWords, totalCorrect, totalAttempts, quizOrder, quizPos, sessionCorrect, sessionWrong })
    .then(() => {
      closeSettings();
      renderHome();
      showToast('모든 기록이 초기화되었습니다 ✓');
    })
    .catch(() => showToast('초기화 중 오류가 발생했습니다'));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('screenQuiz').classList.contains('active')) return;
  if (document.getElementById('quizComplete').classList.contains('show')) return;

  // 하드코어 모드: 스페이스바로 마이크 토글
  if (currentMode === 'hardcore') {
    // 하드코어: Enter로 제출 (input onkeydown에서 처리)
  }

  const keyMap = { 'Numpad1': 0, 'Numpad2': 1, 'Numpad3': 2, 'Numpad4': 3 };

  if (e.code in keyMap) {
    if (answered || historyIdx !== -1 || currentMode === 'hardcore') return;
    const btns = document.querySelectorAll('#quizChoices .quiz-btn');
    const idx = keyMap[e.code];
    if (btns[idx] && !btns[idx].disabled) btns[idx].click();
  }

  if (e.code === 'ArrowRight') {
    const navRow = document.getElementById('quizNavRow');
    if (navRow.classList.contains('show')) nextQuestion();
  }

  // 스페이스바: 하드코어 모드에서 답한 후 다음 문제
  if (e.code === 'Space' && currentMode === 'hardcore' && answered) {
    e.preventDefault();
    const navRow = document.getElementById('quizNavRow');
    if (navRow.classList.contains('show')) nextQuestion();
  }

  if (e.code === 'ArrowLeft') {
    const navRow = document.getElementById('quizNavRow');
    if (navRow.classList.contains('show')) prevQuestion();
  }
});

// ── INIT ──
load();
initKuroshiro();
</script>
